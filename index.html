<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini E-Commerce</title>

  <!-- Google Fonts: Outfit (display) + Inter (fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Bootstrap 5.3 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Custom theme (overrides Bootstrap) -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <!-- ════════════════ TOPBAR ════════════════ -->
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <div class="brand__mark">ME</div>
        <div class="brand__text">
          <div class="brand__name">Mini E-Commerce</div>
        </div>
      </div>

      <div class="topbar__actions">
        <label class="search">
          <span class="search__label">Search</span>
          <input id="searchInput" class="search__input" type="search" placeholder="Search products…"
            autocomplete="off" />
        </label>

        <button id="cartToggle" class="cartBtn" type="button" aria-controls="cartSidebar" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            aria-hidden="true">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          Cart
          <span id="cartCount" class="badge" aria-live="polite">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ════════════════ HERO SECTION ════════════════ -->
  <section class="hero">
    <div class="hero__inner">
      <div class="hero__text reveal-up">
        <div class="hero__series">[ SERIES: AK 47 MARK 3]</div>
        <h1 class="hero__title">COLLECTION<br />TECH FINDS</h1>
        <a href="#productGrid" class="hero__cta ghostBtn">Explore Collection</a>
      </div>
      <div class="hero__visual reveal-up" style="transition-delay: 0.2s">
        <img src="https://i.pinimg.com/1200x/8c/db/e1/8cdbe123010c380e20f264a8fdd57938.jpg"
          class="hero__img" alt="Arctic Futuristic Jacket"
          style="border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);" />
      </div>
    </div>
  </section>

  <!-- ════════════════ MAIN LAYOUT ════════════════ -->
  <main class="layout">

    <!-- Product catalog -->
    <section class="catalog reveal-up">
      <div class="catalog__head">
        <h2 class="catalog__title">Products</h2>
        <div id="statusText" class="catalog__status" aria-live="polite"></div>
      </div>
      <div id="productGrid" class="grid" aria-live="polite"></div>
    </section>

    <!-- Cart sidebar -->
    <aside id="cartSidebar" class="cart" aria-label="Shopping cart">
      <div class="cart__head">
        <h2 class="cart__title">Your Cart</h2>
        <button id="clearCart" class="linkBtn" type="button">Clear</button>
      </div>

      <div id="cartItems" class="cart__items"></div>

      <div class="cart__footer">
        <div class="totalRow">
          <span class="totalRow__label">Total</span>
          <span id="cartTotal" class="totalRow__value">$0.00</span>
        </div>
        <button id="checkoutBtn" class="primaryBtn" type="button" disabled>
          Checkout
        </button>
        <div class="hint">
          Tip: run with a local server so AJAX can load <code>data/products.json</code>.
        </div>
      </div>

      <div class="orders">
        <div class="orders__head">
          <h3 class="orders__title">Previous Orders</h3>
          <button id="clearOrders" class="linkBtn" type="button">Clear</button>
        </div>
        <div id="ordersList" class="orders__list"></div>
      </div>
    </aside>

  </main>

  <!-- ════════════════ TOAST ════════════════ -->
  <div id="toast" class="toast" role="status" aria-live="polite" hidden>
    <div class="toast__inner">
      <div>
        <div id="toastTitle" class="toast__title">Order placed</div>
        <div id="toastMsg" class="toast__msg"></div>
      </div>
      <button id="toastClose" class="toast__close" type="button" aria-label="Close">✕</button>
    </div>
  </div>

  <!-- ════════════════ CHECKOUT MODAL ════════════════ -->
  <div id="checkoutModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle" hidden>
    <div class="modal__overlay modal-overlay" data-close-modal="true"></div>
    <div class="modal__panel">
      <div class="modal__head">
        <h2 id="checkoutTitle" class="modal__title">Checkout</h2>
        <button id="closeCheckout" class="iconBtn" type="button" aria-label="Close checkout">✕</button>
      </div>

      <div class="modal__body">
        <div class="modalGrid">

          <!-- Order summary -->
          <section class="modalCard">
            <div class="modalCard__title">Order summary</div>
            <div id="checkoutSummary" class="summaryList"></div>
            <div class="summaryTotals">
              <div class="totalRow">
                <span class="totalRow__label">Total</span>
                <span id="checkoutTotal" class="totalRow__value">$0.00</span>
              </div>
            </div>
          </section>

          <!-- Checkout form -->
          <form id="checkoutForm" class="modalCard">
            <div class="modalCard__title">Your details</div>

            <label class="field">
              <span class="field__label">Full name</span>
              <input id="checkoutName" class="field__input" name="name" type="text" placeholder="Jane Smith" required />
            </label>

            <label class="field">
              <span class="field__label">Email</span>
              <input id="checkoutEmail" class="field__input" name="email" type="email" placeholder="jane@example.com"
                required />
            </label>

            <label class="field">
              <span class="field__label">Address</span>
              <input id="checkoutAddress" class="field__input" name="address" type="text"
                placeholder="123 Main St, City" required />
            </label>

            <label class="field">
              <span class="field__label">Payment</span>
              <select id="checkoutPayment" class="field__input" name="payment" required>
                <option value="card" selected>Credit / Debit Card (demo)</option>
                <option value="cod">Cash on delivery (demo)</option>
              </select>
            </label>

            <div id="checkoutError" class="formError" role="alert" hidden></div>

            <div class="modalActions">
              <button id="cancelCheckout" class="ghostBtn" type="button">Cancel</button>
              <button id="placeOrderBtn" class="primaryBtn" type="submit">Place order</button>
            </div>

            <!-- <div class="hint">This is a front-end demo — no real payment is processed.</div> -->
          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════ TEMPLATES ════════════════ -->
  <template id="productCardTpl">
    <article class="card">
      <div class="card__media">
        <img class="card__img" alt="" loading="lazy" />
      </div>
      <div class="card__body">
        <div class="card__top">
          <h3 class="card__title"></h3>
          <div class="card__price"></div>
        </div>
        <div class="card__meta"></div>
        <p class="card__desc"></p>
        <div class="card__actions">
          <button class="primaryBtn addToCartBtn" type="button">Add to cart</button>
        </div>
      </div>
    </article>
  </template>

  <!-- Custom toast container (bottom-right) -->
  <div id="customToastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <template id="cartItemTpl">
    <div class="cart-item" role="group" aria-label="Cart item" data-product-id="">
      <img src="" alt="" class="cart-item-img" />
      <div class="cart-item-details">
        <h6 class="cart-item-title">Product Name</h6>
        <div class="cart-item-meta">
          <div class="cart-item-price">$0.00</div>
          <div class="quantity-controls">
            <button class="qty-minus" type="button" aria-label="Decrease">−</button>
            <span class="qty-number">1</span>
            <button class="qty-plus" type="button" aria-label="Increase">+</button>
          </div>
        </div>
      </div>
      <div class="cart-item-actions">
        <div class="cart-item-lineTotal">$0.00</div>
        <button class="linkDanger removeFromCartBtn" type="button" aria-label="Remove">Remove</button>
      </div>
    </div>
  </template>

  <template id="orderTpl">
    <div class="order">
      <div class="order__top">
        <div class="order__id"></div>
        <div class="order__total"></div>
      </div>
      <div class="order__meta"></div>
      <div class="order__items"></div>
    </div>
  </template>

  <!-- ════════════════ SCRIPTS ════════════════ -->
  <!-- Bootstrap 5.3 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jQuery 3.7 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Main application logic -->
  <script src="./js/app.js"></script>
</body>

</html>
